<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Countdown</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Freedom Countdown</h1>
            <p class="subtitle">Until I'm out of this hell</p>
        </header>
        
        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
        
        <div class="release-date">
            <p>Release Date: <span id="releaseDate">September 12, 2026</span></p>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="progress-text" id="progressText">0.0% completed</p>
        </div>
        
        <div class="stats">
            <p><span id="weeksDays">0 weeks, 0 days</span> remaining</p>
        </div>
        
        <div class="holiday-display" id="holidayDisplay"></div>
        
        <div class="quote">
            <p id="quoteText">"The will of God is your freedom."</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
